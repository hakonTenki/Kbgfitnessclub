backend:
  name: git-gateway
  branch: main

site_url: https://kbgfitnessclub.com

media_folder: webshopmedia
public_folder: webshopmedia

locale: 'nb'

collections:
  - name: "info"
    label: "Priser & åpningstider"
    files:
      - name: "siteinfo"
        label: "Priser & åpningstider"
        file: "_data/info.json"
        fields:
          - label: "Åpningstider (f.eks. 05:00 – 23:00)"
            name: "openHours"
            widget: "string"
          - label: "Resepsjonstid (f.eks. 14:00–16:00)"
            name: "receptionHours"
            widget: "string"
          - label: "Telefon 1 (f.eks. +47 414 11 231)"
            name: "phone1"
            widget: "string"
          - label: "Telefon 2 (f.eks. +47 416 22 690)"
            name: "phone2"
            widget: "string"
          - label: "Formiddagsmedlemskap – pris kr/mnd"
            name: "priceFormiddag"
            widget: "string"
          - label: "Heldagsmedlemskap – pris kr/mnd"
            name: "priceHeldag"
            widget: "string"
          - label: "Pakke 3 måneder – pris kr"
            name: "price3mnd"
            widget: "string"
          - label: "Pakke 6 måneder – pris kr"
            name: "price6mnd"
            widget: "string"
          - label: "Pakke 12 måneder – pris kr"
            name: "price12mnd"
            widget: "string"
          - label: "Familiemedlem – pris kr/mnd"
            name: "priceFamilie"
            widget: "string"

  - name: "butikk"
    label: "Nettbutikk"
    files:
      - name: "produkter"
        label: "Produkter"
        file: "_data/products.json"
        fields:
          - label: "Produktliste"
            name: "products"
            widget: "list"
            label_singular: "Produkt"
            summary: "{{fields.name}} – {{fields.category}}"
            fields:
              - label: "Produktnavn"
                name: "name"
                widget: "string"
              - label: "Kategori"
                name: "category"
                widget: "select"
                options:
                  - {label: "Gavekort", value: "gavekort"}
                  - {label: "Kosttilskudd", value: "kosttilskudd"}
                  - {label: "Merch", value: "merch"}
                  - {label: "Treningsutstyr", value: "utstyr"}
              - label: "Beskrivelse"
                name: "desc"
                widget: "text"
              - label: "Pris (f.eks. «199 kr» eller «Valgfritt beløp»)"
                name: "price"
                widget: "string"
                required: false
              - label: "Bilde"
                name: "image"
                widget: "image"
              - label: "Badge (valgfri – f.eks. «Salg» eller «Ny»)"
                name: "badge"
                widget: "string"
                required: false
              - label: "Opprinnelig pris (valgfri – kun ved salg, f.eks. «599 kr»)"
                name: "originalPrice"
                widget: "string"
                required: false
              - label: "Varigheter (kun for gavekort med fast pris per periode)"
                name: "durations"
                widget: "list"
                required: false
                fields:
                  - {label: "Varighet", name: "label", widget: "string"}
                  - {label: "Pris", name: "price", widget: "string"}
